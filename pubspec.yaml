name: ecommerce_image_tool
description: "电商图片处理工具 - 智能抠图、白底图、批量处理、多平台尺寸适配"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_onnxruntime: ^1.8.0
  image: ^4.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  file_picker: ^8.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/models/
